name: AI Feature Implementation

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  implement-feature:
    if: github.event.label.name == 'ai-feature'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Implement the feature requested in issue #${{ github.event.issue.number }}.

            Please read CLAUDE.md for complete implementation guidelines, patterns, and conventions.

            Key requirements:
            - Follow all patterns documented in CLAUDE.md
            - Use existing components and conventions
            - Ensure code passes build and lint checks
            - Test the implementation thoroughly
            - Create clear commit messages

            After implementation:
            - Run: npm run build
            - Run: npm run lint
            - Fix any errors before completing

          claude_args: |
            {
              "model": "claude-sonnet-4-6",
              "max_turns": 10,
              "base_branch": "dev",
              "new_branch": "ai-feature/issue-${{ github.event.issue.number }}-${{ github.run_id }}",
              "create_pr": true,
              "pr_title": "🤖 AI Feature: ${{ github.event.issue.title }}",
              "pr_body": "## 🤖 AI-Implemented Feature\n\nThis PR was automatically generated by Claude Code Action to implement the feature requested in issue #${{ github.event.issue.number }}.\n\n### Issue Details\n**Title:** ${{ github.event.issue.title }}\n**Requested by:** @${{ github.event.issue.user.login }}\n\n### Implementation Notes\n- Branch: `ai-feature/issue-${{ github.event.issue.number }}-${{ github.run_id }}`\n- Base: `dev`\n- Target: `dev`\n- Model: Claude Sonnet 4.6\n- Max turns: 10\n\n### Testing Checklist\n- [ ] Build passes (`npm run build`)\n- [ ] Lint passes (`npm run lint`)\n- [ ] Feature works as expected in preview deployment\n- [ ] No breaking changes to existing functionality\n- [ ] Code follows patterns in CLAUDE.md\n- [ ] Database migrations applied (if any)\n\n### Review Instructions\n1. Check the preview deployment link from Vercel\n2. Test the implemented feature thoroughly\n3. Review code for quality and adherence to conventions\n4. Request changes if needed\n5. Approve and merge to `dev` for staging testing\n\n### Related Issue\nCloses #${{ github.event.issue.number }}\n\n---\n🍣 Generated with [Claude Code](https://claude.com/claude-code) | Model: Sonnet 4.6",
              "pr_assignees": ["${{ github.event.issue.user.login }}"],
              "pr_reviewers": ["${{ github.event.issue.user.login }}"]
            }
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_DEV_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_DEV_ANON_KEY }}

      - name: Comment on issue - Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 **AI Implementation Complete!**\n\nClaude has finished implementing your feature request. A pull request has been created and is ready for review.\n\n📋 **Next Steps:**\n1. Review the pull request\n2. Test the preview deployment from Vercel\n3. Request changes if needed or approve and merge\n\n🔗 Check the [Actions tab](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for full details.'
            })

      - name: Comment on issue - Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **AI Implementation Failed**\n\nClaude encountered an error while implementing this feature. Please check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n\n**Common issues:**\n- Feature requirements unclear or ambiguous\n- Conflicting with existing code\n- Database schema changes needed\n- External dependencies required\n\nPlease refine the issue description and try again, or implement manually.'
            })
