name: AI Feature Implementation

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  implement-feature:
    if: github.event.label.name == 'ai-feature'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Gemini CLI
        uses: google-github-actions/run-gemini-cli@main
        with:
          gemini_api_key: ${{ secrets.GOOGLE_API_KEY }}
          prompt: |
            Implement the feature requested in issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            Issue Description:
            ${{ github.event.issue.body }}

            Please read GEMINI.md for complete implementation guidelines, patterns, and conventions.

            Key requirements:
            - Follow all patterns documented in GEMINI.md
            - Use existing components and conventions
            - Ensure code passes build and lint checks
            - Test the implementation thoroughly
            - Commit your changes directly to the dev branch
            - Use clear, descriptive commit messages
            - Reference issue #${{ github.event.issue.number }} in your commit message
            - Push your commits to origin/dev when complete

            After implementation:
            - Run: npm run build
            - Run: npm run lint
            - Fix any errors before committing
            - Commit all changes with message: "feat: implement issue #${{ github.event.issue.number }} - ${{ github.event.issue.title }}"
            - Push to dev branch

            Environment variables available:
            - NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_DEV_URL }}
            - NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_DEV_ANON_KEY }}
            - GITHUB_TOKEN: Available for git operations
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_DEV_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_DEV_ANON_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on issue - Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 **AI Implementation Complete!**\n\nGemini has finished implementing your feature request and committed the changes directly to the `dev` branch.\n\n📋 **Next Steps:**\n1. Check the dev preview deployment from Vercel\n2. Test the implemented feature\n3. Review the commits in the dev branch\n4. If everything works, merge dev to main for production\n\n🔗 [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n🔗 [View dev branch](${{ github.server_url }}/${{ github.repository }}/tree/dev)\n\nCloses #${{ github.event.issue.number }}'
            })

      - name: Comment on issue - Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **AI Implementation Failed**\n\nGemini encountered an error while implementing this feature. Please check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n\n**Common issues:**\n- Feature requirements unclear or ambiguous\n- Conflicting with existing code\n- Database schema changes needed\n- External dependencies required\n\nPlease refine the issue description and try again, or implement manually.'
            })
