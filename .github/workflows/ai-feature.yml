name: AI Feature Implementation

on:
  issues:
    types: [labeled]

jobs:
  implement-feature:
    if: github.event.label.name == 'ai-feature'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          # API Key from GitHub Secrets
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Model configuration
          model: claude-sonnet-4-6
          max_turns: 10

          # Branch configuration
          base_branch: dev
          new_branch: ai-feature/issue-${{ github.event.issue.number }}-${{ github.run_id }}

          # Issue details
          issue_number: ${{ github.event.issue.number }}

          # Build and test commands
          build_command: npm run build
          lint_command: npm run lint

          # PR configuration
          create_pr: true
          pr_title: "🤖 AI Feature: ${{ github.event.issue.title }}"
          pr_body: |
            ## 🤖 AI-Implemented Feature

            This PR was automatically generated by Claude Code Action to implement the feature requested in issue #${{ github.event.issue.number }}.

            ### Issue Details
            **Title:** ${{ github.event.issue.title }}
            **Requested by:** @${{ github.event.issue.user.login }}

            ### Implementation Notes
            - Branch: `ai-feature/issue-${{ github.event.issue.number }}-${{ github.run_id }}`
            - Base: `dev`
            - Target: `dev`
            - Model: Claude Sonnet 4.6
            - Max turns: 10

            ### Testing Checklist
            - [ ] Build passes (`npm run build`)
            - [ ] Lint passes (`npm run lint`)
            - [ ] Feature works as expected in preview deployment
            - [ ] No breaking changes to existing functionality
            - [ ] Code follows patterns in CLAUDE.md
            - [ ] Database migrations applied (if any)

            ### Review Instructions
            1. Check the preview deployment link from Vercel
            2. Test the implemented feature thoroughly
            3. Review code for quality and adherence to conventions
            4. Request changes if needed
            5. Approve and merge to `dev` for staging testing

            ### Related Issue
            Closes #${{ github.event.issue.number }}

            ---
            🍣 Generated with [Claude Code](https://claude.com/claude-code) | Model: Sonnet 4.6

          # Assign PR to issue creator
          pr_assignees: ${{ github.event.issue.user.login }}
          pr_reviewers: ${{ github.event.issue.user.login }}

          # Environment variables for the AI agent
          env_vars: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_DEV_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_DEV_ANON_KEY }}

      - name: Comment on issue - Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 **AI Implementation Complete!**\n\nClaude has finished implementing your feature request. A pull request has been created and is ready for review.\n\n📋 **Next Steps:**\n1. Review the pull request\n2. Test the preview deployment from Vercel\n3. Request changes if needed or approve and merge\n\n🔗 Check the [Actions tab](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for full details.'
            })

      - name: Comment on issue - Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **AI Implementation Failed**\n\nClaude encountered an error while implementing this feature. Please check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n\n**Common issues:**\n- Feature requirements unclear or ambiguous\n- Conflicting with existing code\n- Database schema changes needed\n- External dependencies required\n\nPlease refine the issue description and try again, or implement manually.'
            })
